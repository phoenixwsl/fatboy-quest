<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1a1f4a"/>
      <stop offset="100%" stop-color="#050818"/>
    </radialGradient>
    <radialGradient id="egg" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 星星 -->
  <circle cx="80" cy="80" r="3" fill="white" opacity="0.7"/>
  <circle cx="430" cy="120" r="2" fill="white" opacity="0.5"/>
