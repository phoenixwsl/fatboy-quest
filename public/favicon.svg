  <!-- 反光 -->
  <ellipse cx="200" cy="180" rx="40" ry="28" fill="white" opacity="0.4"/>
  <!-- 眼睛 -->
  <ellipse cx="210" cy="260" rx="15" ry="22" fill="#1a1a2e"/>
  <ellipse cx="302" cy="260" rx="15" ry="22" fill="#1a1a2e"/>
  <circle cx="215" cy="252" r="5" fill="white"/>
  <circle cx="307" cy="252" r="5" fill="white"/>
  <!-- 嘴巴 -->
  <path d="M 200 330 Q 256 380 312 330" stroke="#1a1a2e" stroke-width="10" fill="#ef4444" stroke-linecap="round"/>
  <!-- 腮红 -->
  <circle cx="170" cy="310" r="14" fill="#f87171" opacity="0.6"/>
  <circle cx="342" cy="310" r="14" fill="#f87171" opacity="0.6"/>
